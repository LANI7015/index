<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>性格診断テスト</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #fdf2f8);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 680px;
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(31,41,55,0.16);
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: 0.03em;
    }
    .subtitle {
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.7;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }
    input[type="date"], select {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 1rem;
      background: white;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      color: white;
      background: #4f46e5;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { background: #4338ca; transform: translateY(-1px); }
    button:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
    .loading {
      margin-top: 24px;
      color: #4f46e5;
      font-weight: 700;
      display: none;
    }
    .result {
      display: none;
      margin-top: 28px;
      padding: 24px;
      border-radius: 20px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      line-height: 1.9;
    }
    .result h2 {
      margin-top: 0;
      color: #111827;
    }
    .result-block {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: white;
      border: 1px solid #e5e7eb;
    }
    .result-block h3 {
      margin: 0 0 8px;
      color: #4f46e5;
      font-size: 1.1rem;
    }
    .result ul {
      padding-left: 1.2em;
    }
    .reveal {
      display: none;
      margin-top: 24px;
      padding: 20px;
      border-radius: 18px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      line-height: 1.8;
    }
    .reveal strong { color: #c2410c; }
    .small {
      font-size: 0.9rem;
      color: #6b7280;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>生年月日による性格診断</h1>
    <p class="subtitle">
      生年月日を入力すると、あなたの内面傾向を分析します。<br>
      直感で読んで、どのくらい自分に当てはまるか考えてみてください。
    </p>

    <label for="birthdate">生年月日</label>
    <input id="birthdate" type="date" />

    <label for="bloodtype">血液型</label>
    <select id="bloodtype">
      <option value="">選択してください</option>
      <option value="A">A型</option>
      <option value="B">B型</option>
      <option value="O">O型</option>
      <option value="AB">AB型</option>
      <option value="不明">不明</option>
    </select>

    <button id="diagnoseBtn">診断する</button>

    <div id="loading" class="loading">分析中です……</div>

    <section id="result" class="result">
      <h2>診断結果</h2>

      <div class="result-block">
        <h3>あなたの長所</h3>
        <ul id="strengths"></ul>
      </div>

      <div class="result-block">
        <h3>あなたの短所</h3>
        <ul id="weaknesses"></ul>
      </div>

      <div class="result-block">
        <h3>今後のアドバイス</h3>
        <ul id="advice"></ul>
      </div>

      <p class="small">この診断がどのくらい自分に当てはまるか、0〜100点で考えてみてください。</p>
    </section>

  </main>

      "責任感があり、頼まれたことをきちんと果たそうとする姿勢があります。",
      "新しいことを吸収する力があり、経験から学ぶことができます。",
      "表面的なことだけでなく、物事の奥にある意味を考えることができます。",
      "必要な場面では周囲に合わせつつ、自分の考えも大切にできます。",
      "人から見えにくいところでも努力を積み重ねる力があります。",
      "落ち着いて考え、感情だけで判断しない慎重さがあります。",

    ];

      "期待に応えようとするあまり、必要以上に頑張りすぎることがあります。",

      "気持ちを切り替えたつもりでも、過去の出来事を引きずることがあります。",
      "失敗を恐れて、せっかくの機会を慎重に見送りすぎることがあります。",
      "周囲に合わせすぎると、自分のペースを見失うことがあります。",
      "親しい人ほど、わかってほしい気持ちが強くなりやすいです。",
      "気分の波によって、集中力や行動力に差が出ることがあります。",

    ];

    const adviceTexts = [

      "すべてを完璧にしようとせず、できた部分にも目を向けることが大切です。",
      "人に合わせるだけでなく、自分がどうしたいかを言葉にする時間を持つとよいでしょう。",
      "疲れを感じた時は、無理に前向きになろうとせず休むことも必要です。",
      "自分の弱さを隠しすぎず、信頼できる人には少しずつ頼ってみるとよいでしょう。",
      "大きな決断ほど、一度に答えを出そうとせず段階的に考えると安定します。",
      "過去の失敗よりも、そこから何を学んだかに意識を向けると次につながります。",
      "周囲からの評価だけでなく、自分自身の納得感を判断基準にしてみましょう。",

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    document.getElementById("diagnoseBtn").addEventListener("click", () => {
      const birthdate = document.getElementById("birthdate").value;
      const loading = document.getElementById("loading");
      const result = document.getElementById("result");
      const button = document.getElementById("diagnoseBtn");

      if (!birthdate) {
        alert("生年月日を入力してください。");
        return;
      }

          li.textContent = text;

        loading.style.display = "none";

        button.disabled = false;

    });
  </script>
</body>
</html>
