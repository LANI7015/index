<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>性格診断テスト</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #fdf2f8);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 680px;
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(31,41,55,0.16);
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: 0.03em;
    }
    .subtitle {
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.7;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }
    input[type="date"] {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 1rem;
      background: white;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      color: white;
      background: #4f46e5;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { background: #4338ca; transform: translateY(-1px); }
    button:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
    .loading {
      margin-top: 24px;
      color: #4f46e5;
      font-weight: 700;
      display: none;
    }
    .result {
      display: none;
      margin-top: 28px;
      padding: 24px;
      border-radius: 20px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      line-height: 1.9;
    }
    .result h2 {
      margin-top: 0;
      color: #111827;
    }
    .result ul {
      padding-left: 1.2em;
    }
    .reveal {
      display: none;
      margin-top: 24px;
      padding: 20px;
      border-radius: 18px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      line-height: 1.8;
    }
    .reveal strong { color: #c2410c; }
    .small {
      font-size: 0.9rem;
      color: #6b7280;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>生年月日による性格診断</h1>
    <p class="subtitle">
      生年月日を入力すると、あなたの内面傾向を分析します。<br>
      直感で読んで、どのくらい自分に当てはまるか考えてみてください。
    </p>

    <label for="birthdate">生年月日</label>
    <input id="birthdate" type="date" />
    <button id="diagnoseBtn">診断する</button>

    <div id="loading" class="loading">分析中です……</div>

    <section id="result" class="result">
      <h2>診断結果</h2>
      <p id="mainText"></p>
      <ul id="points"></ul>
      <p class="small">この診断がどのくらい自分に当てはまるか、0〜100点で考えてみてください。</p>
    </section>

  </main>

  <script>
    const barnumTexts = [
      "あなたは人からどう見られているかを気にする一方で、本当の自分を簡単には見せない慎重さを持っています。",
      "あなたには独立した考え方があり、納得できないことには流されにくい面があります。",
      "普段は落ち着いて見られることが多いですが、内面では迷いや不安を抱えることもあります。",
      "あなたは自分に厳しいところがあり、もっとできたはずだと感じることがあります。",
      "人とのつながりを大切にしますが、ときには一人で考える時間も必要としています。",
      "あなたにはまだ十分に発揮されていない可能性があり、環境次第で大きく伸びる力があります。",
      "表面的な言葉よりも、自分のことを本当に理解してくれる人を求める傾向があります。",
      "あなたは変化を望む気持ちと、安定を求める気持ちの両方を持っています。",
      "周囲には明るく振る舞っていても、心の中では疲れや迷いを抱えていることがあります。",
      "あなたは大切な場面では慎重になりますが、興味を持ったことには思いきって行動できる面があります。",
      "自分では普通だと思っていることでも、周囲から見ると意外な魅力として映っていることがあります。",
      "あなたは人に合わせる力がありますが、心の奥では自分のペースを守りたい気持ちも強く持っています。",
      "他人の何気ない言葉を気にしすぎてしまうことがありますが、それは感受性の豊かさの表れでもあります。",
      "あなたは理性的に判断しようとしますが、最終的には直感や気分に左右されることもあります。",
      "人から頼られると嬉しい一方で、期待されすぎると負担に感じることがあります。",
      "あなたは自分の弱さを見せるのが得意ではありませんが、本当は理解されたい気持ちを持っています。",
      "新しいことに興味はありますが、始める前には失敗しないかをよく考える傾向があります。",
      "あなたは集団の中で協調できますが、心の中では自分だけの考えを大切にしています。",
      "過去の経験から学ぶ力があり、同じ失敗を繰り返さないよう注意深く行動することがあります。",
      "あなたは人の気持ちに敏感で、場の雰囲気を読み取ろうとする傾向があります。",
      "物事を深く考えるため、時には考えすぎて行動が遅れることがあります。",
      "あなたは自由を求める気持ちと、誰かに支えてほしい気持ちの両方を持っています。",
      "普段は自分をコントロールしようとしていますが、疲れていると感情が表に出やすくなることがあります。",
      "あなたは周囲に誤解されることを嫌い、本当の意図が伝わっているか気にすることがあります。",
      "一見すると穏やかですが、自分の中には譲れない価値観やこだわりがあります。",
      "あなたは自分の可能性を信じたい一方で、本当にうまくいくのか不安になることもあります。",
      "人に認められたい気持ちはありますが、あからさまに評価を求めることには抵抗があります。",
      "あなたは現実的に考えようとしますが、ときどき理想を追い求めたくなる面もあります。",
      "気持ちを切り替えたつもりでも、心のどこかで過去の出来事を引きずることがあります。",
      "あなたは自分のことをもっと理解したいという気持ちを持っており、内面を見つめる力があります。"
    ];

    const pointTexts = [
      "周囲に合わせることはできますが、心の中では自分なりの基準を大切にしています。",
      "過去の経験から、簡単には人を信用しすぎない慎重さがあります。",
      "褒められると嬉しい反面、期待に応えなければというプレッシャーを感じやすいです。",
      "一見すると普通に振る舞っていても、実は細かいところまでよく考えています。",
      "失敗を忘れたように見えても、心の中では何度も振り返ることがあります。",
      "自分の長所をわかってほしい気持ちと、目立ちすぎたくない気持ちが同時にあります。",
      "自分では気にしていないつもりでも、他人の反応に影響を受けやすいところがあります。",
      "やる気がある時とない時の差があり、自分でもその波を扱いにくいと感じることがあります。",
      "人前では冷静に見せようとしますが、内面ではかなり繊細に反応しています。",
      "新しい環境では様子を見ますが、慣れると自分らしさを発揮しやすくなります。",
      "自分の考えを持っていますが、相手を傷つけないよう言い方を選ぶことがあります。",
      "本当はもっと評価されてもよいのではないかと感じることがあります。",
      "一人の時間がないと疲れますが、人とのつながりがなくなると寂しさも感じます。",
      "計画的に進めたい気持ちと、その時の気分で動きたい気持ちの両方があります。",
      "周囲からの期待に応えようとして、必要以上に頑張ってしまうことがあります。",
      "自分の短所にはよく気づきますが、長所には気づきにくい傾向があります。",
      "親しい人には本音を出せますが、初対面では少し距離を置くことがあります。",
      "何かを決める時、正解を探しすぎて迷ってしまうことがあります。",
      "他人には寛容でいようとしますが、自分には厳しくなりがちです。",
      "大きな変化には不安を感じますが、同時に今の自分を変えたい気持ちもあります。",
      "気分が乗ると集中力を発揮しますが、関心が持てないことには力を出しにくいです。",
      "本当は甘えたい気持ちがあっても、相手に迷惑をかけたくないと思うことがあります。",
      "周囲の雰囲気を読みすぎて、自分の意見を後回しにすることがあります。",
      "表面的な付き合いより、少数でも深く理解し合える関係を求めています。",
      "人に弱みを見せることに抵抗がありますが、信頼できる相手には支えてほしいと思っています。",
      "自分の中に矛盾した気持ちがあることを感じ、それをうまく整理したいと思うことがあります。",
      "何気ない出来事から大きな意味を見つけようとするところがあります。",
      "自分のペースを乱されると疲れやすいですが、必要な場面では合わせることができます。",
      "周囲からは気づかれにくい努力をしていることがあります。",
      "相手の期待を察する力がありますが、その分、自分が疲れてしまうこともあります。"
    ];

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    document.getElementById("diagnoseBtn").addEventListener("click", () => {
      const birthdate = document.getElementById("birthdate").value;
      const loading = document.getElementById("loading");
      const result = document.getElementById("result");
      const button = document.getElementById("diagnoseBtn");

      if (!birthdate) {
        alert("生年月日を入力してください。");
        return;
      }

      result.style.display = "none";
      loading.style.display = "block";
      button.disabled = true;

      setTimeout(() => {
        const main = shuffle(barnumTexts).slice(0, 3).join(" ");
        const points = shuffle(pointTexts).slice(0, 4);

        document.getElementById("mainText").textContent = main;
        const ul = document.getElementById("points");
        ul.innerHTML = "";
        points.forEach(text => {
          const li = document.createElement("li");
          li.textContent = text;
          ul.appendChild(li);
        });

        loading.style.display = "none";
        result.style.display = "block";
        button.disabled = false;
      }, 1400);
    });
  </script>
</body>
</html>
